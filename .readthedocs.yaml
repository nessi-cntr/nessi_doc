version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - doxygen
  jobs:
    pre_build:
      - doxygen Doxyfile

sphinx:
  configuration: conf.py

python:
  install:
    - requirements: requirements.txt
